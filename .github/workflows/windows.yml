name: Windows

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  msys2:
    name: MSYS2 ${{ matrix.sys }}
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        sys:
          - mingw64
          - ucrt64
          - clang64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup MSYS2 ${{ matrix.sys }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          update: true
          pacboy: >-
            cmake:p
            ninja:p
            toolchain:p
            boost:p
            catch:p

      - name: Configure
        run: |
          cmake -S . -B build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPCCL_NATIVE_ARCH=OFF \
            -DCMAKE_C_FLAGS="-march=x86-64-v3" \
            -DCMAKE_CXX_FLAGS="-march=x86-64-v3"

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          UBSAN_OPTIONS: "suppressions=${{ github.workspace }}/tests/ubsan_suppressions.txt:print_stacktrace=1:halt_on_error=1"
        run: ctest --test-dir build --output-on-failure

  msvc:
    name: MSVC 2022 x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install cmake + ninja
        shell: pwsh
        run: choco install --no-progress -y ninja cmake

      - name: Install boost + Catch2 (vcpkg)
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          C:\vcpkg\vcpkg.exe install boost-container catch2 --triplet x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -GNinja `
            -DCMAKE_BUILD_TYPE=Release `
            -DPCCL_NATIVE_ARCH=OFF `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
